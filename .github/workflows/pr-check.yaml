name: Analysis Check

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    if: ${{ github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.author.name, 'dependabot') }}
    name: "Format & Analyze"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Flutter Setup & Analysis
        uses: ./.github/actions/flutter-setup
